# Supabase project configuration.
# Edge Function schedules are declared here; the Supabase CLI reads this file
# when running `supabase functions deploy`.

project_id = "cognilion"

# ----------------------------------------------------------------------------
# Edge Functions
# ----------------------------------------------------------------------------

[functions.dispatch-calendar-reminders]
# DISABLED — not in use. `enabled = false` tells `supabase functions deploy`
# to skip this function while keeping its source in the repo. Remove the
# supabase/functions/dispatch-calendar-reminders/ directory to drop it entirely.
enabled = false
verify_jwt = false

[functions.ai-chat]
verify_jwt = true

[functions.sort-document]
# Called by the Make.com email-automation scenario, not a browser — there is
# no user JWT. The function authenticates the caller itself via a shared
# secret (x-doc-sort-secret header), so Supabase's JWT gate is disabled.
verify_jwt = false
